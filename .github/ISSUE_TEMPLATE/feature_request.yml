name: 💡 Feature request
description: Suggest an idea or improvement for Label Alchemy.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! The clearer the problem, the more likely it gets built.

        Want others to be able to upvote your idea? Consider posting it in [Discussions → Ideas](../../discussions/categories/ideas) instead — the most-upvoted ideas help shape the roadmap.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and didn't find a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or pain point — "I'm always trying to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Label Alchemy to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you thought about.
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - String detection / scanner
        - Label naming (deterministic)
        - AI naming
        - Diff & approval
        - Bulk convert
        - Deploy to org
        - Audit Report
        - Other
    validations:
      required: false
